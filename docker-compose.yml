# Data Push Platform — local / demo stack
#
# Default (sync execution, no Celery):
#   docker compose up -d --build
#
# Optional async worker (set EXECUTION_SYNC=false on api/scheduler too):
#   docker compose --profile worker up -d --build
#
# Frontend: run separately with `cd frontend && npm run dev` (proxies /api → :8000)

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_USER: push
      MYSQL_PASSWORD: push
      MYSQL_DATABASE: push
      MYSQL_ROOT_PASSWORD: rootpush
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-upush", "-ppush"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment: &backend_env
      DATABASE_URL: mysql+pymysql://push:push@mysql:3306/push
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      # Dev-only Fernet key — generate your own for real deployments:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      TOKEN_FERNET_KEY: "b2oli7D5BQ8tJcl6Rs4DmSAbdPxyIrMZ-NMGNHP0np0="
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      EXECUTION_SYNC: "true"
      STORAGE_ROOT: /app/storage
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://127.0.0.1:5173"]'
      RUN_MIGRATIONS: "1"
    volumes:
      - storage_data:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.modules.scheduler"]
    environment:
      <<: *backend_env
      RUN_MIGRATIONS: "0"
    volumes:
      - storage_data:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # Optional Celery worker — enable with: docker compose --profile worker up -d
  # When using the worker, set EXECUTION_SYNC=false on api + scheduler.
  worker:
    profiles: ["worker"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.worker.celery_app.celery_app", "worker", "--loglevel=info"]
    environment:
      <<: *backend_env
      EXECUTION_SYNC: "false"
      RUN_MIGRATIONS: "0"
    volumes:
      - storage_data:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  storage_data:
